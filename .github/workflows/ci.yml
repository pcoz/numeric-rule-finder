# Run the test suite on every push and pull request, across supported Pythons.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Editable core install + the dev extras (pytest, scikit-learn, numpy).
      # The optional Petri-net adapter (petra-nn) is NOT installed; the few tests
      # that need it `importorskip` and skip cleanly.
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run the suite
        run: python -m pytest tests examples -q
