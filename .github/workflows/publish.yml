# Publish numeric-rule-finder to PyPI when a semver tag (e.g. v0.1.1) is pushed.
#
# Uses PyPI **trusted publishing** (PEP 740 / OIDC) — no API token is stored in
# this repo. The trust relationship is configured once on PyPI's side.
#
# ---------------------------------------------------------------------------
# ONE-TIME SETUP (do this once, in a browser, before the first tag-triggered release)
# ---------------------------------------------------------------------------
# 1. On PyPI, open the numeric-rule-finder project → Settings → Publishing
#    (or Account → Publishing → "Add a pending publisher" if it didn't exist).
# 2. Add a trusted publisher with:
#       PyPI project name:  numeric-rule-finder
#       Owner:              pcoz
#       Repository name:    numeric-rule-finder
#       Workflow filename:  publish.yml
#       Environment name:   pypi
# 3. In this repo's Settings → Environments, create an environment named `pypi`.
#
# ---------------------------------------------------------------------------
# RELEASE PROCEDURE (for every future version)
# ---------------------------------------------------------------------------
# 1. Bump `version` in pyproject.toml.
# 2. Commit it.
# 3. Tag and push:   git tag v0.1.1 && git push origin v0.1.1
# 4. This workflow builds the sdist + wheel and publishes them to PyPI.

name: publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build
        run: python -m build
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for trusted publishing (OIDC)
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # don't fail if a version is already uploaded
